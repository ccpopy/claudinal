<!doctype html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claudinal</title>
    <style>
      :root {
        --background: #f5f2e9;
        --foreground: #2d2d2b;
        --muted: #6b6961;
        --primary: #cc7d5e;
        --border: #e2ded3;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--background);
        color: var(--foreground);
      }
      body {
        display: grid;
        place-items: center;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .startup {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      .startup:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 55%, transparent);
        outline-offset: 10px;
        border-radius: 12px;
      }
      pre {
        margin: 0;
        color: var(--primary);
        font-family: ui-monospace, "Cascadia Code", "Cascadia Mono", Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.15;
        animation: bob 1s steps(2, end) infinite;
      }
      .heart {
        height: 16px;
        color: var(--primary);
        font-family: ui-monospace, "Cascadia Code", "Cascadia Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1;
      }
      .label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--muted);
        font-size: 12px;
        background: #fffdf8;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--primary);
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-1px);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="startup"
      role="button"
      tabindex="0"
      title="点击抚摸"
      aria-label="Claudinal 正在启动，点击抚摸 Buddy"
    >
      <pre aria-hidden="true">  /\_/\
 ( o   o )
 (   ω   )
 (")_(")</pre>
      <div class="heart" aria-hidden="true">♥    ♥</div>
      <div class="label">
        <span class="dot" aria-hidden="true"></span>
        <span>正在唤醒会话</span>
      </div>
    </main>
    <script>
      const heart = document.querySelector(".heart");
      const startup = document.querySelector(".startup");
      const frames = ["♥    ♥", "  ♥  ♥   ♥", " ♥   ♥  ♥", "♥  ♥      ♥", "·    ·   ·"];
      let timer = 0;
      function pet() {
        window.clearInterval(timer);
        let i = 0;
        heart.textContent = frames[0];
        timer = window.setInterval(() => {
          i += 1;
          if (i >= frames.length) {
            window.clearInterval(timer);
            timer = 0;
            heart.textContent = "♥    ♥";
            return;
          }
          heart.textContent = frames[i];
        }, 140);
      }
      startup.addEventListener("click", pet);
      startup.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        pet();
      });
      pet();
    </script>
  </body>
</html>
